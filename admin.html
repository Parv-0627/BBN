<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0f0f0f;
    font-family:'Noto Sans Devanagari', sans-serif;
    color:#eee;
    min-height:100vh;
    padding:20px;
  }
  .container { max-width:500px; margin:0 auto; }

  .logo { text-align:center; padding:20px 0 30px; }
  .logo span {
    font-family:Georgia,serif; font-size:36px; font-weight:700;
    background:linear-gradient(to bottom,#F5D77A,#D4A520,#8B6508);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; letter-spacing:3px;
  }
  .logo p { font-size:12px; color:#555; letter-spacing:2px; margin-top:4px; }

  .section {
    background:#1a1a1a; border:1px solid #2a2a2a;
    border-radius:10px; padding:20px; margin-bottom:16px;
  }
  .section-title {
    font-size:13px; color:#D4A520; letter-spacing:1px;
    text-transform:uppercase; margin-bottom:12px; font-weight:700;
  }

  label { display:block; font-size:12px; color:#888; margin-bottom:6px; margin-top:14px; }
  label:first-of-type { margin-top:0; }

  input, textarea {
    width:100%; background:#111; border:1px solid #333; border-radius:6px;
    color:#fff; font-size:15px; font-family:'Noto Sans Devanagari',sans-serif;
    padding:10px 12px; outline:none; transition:border 0.2s;
  }
  input:focus, textarea:focus { border-color:#D4A520; }
  textarea { resize:vertical; min-height:80px; line-height:1.5; }

  /* Hindi Keyboard */
  .hindi-keyboard {
    background:#111; border:1px solid #2a2a2a;
    border-radius:8px; padding:10px; margin-top:10px;
  }
  .kb-rows { display:flex; flex-direction:column; gap:6px; }
  .kb-row { display:flex; gap:4px; flex-wrap:wrap; justify-content:center; }
  .kb-key {
    background:#1e1e1e; border:1px solid #333; border-radius:5px;
    color:#fff; font-size:14px;
    font-family:'Noto Sans Devanagari',sans-serif;
    padding:7px 6px; cursor:pointer; min-width:32px;
    text-align:center; transition:background 0.15s;
    flex-shrink:0;
  }
  .kb-key:active { background:#D4A520; color:#000; }
  .kb-key.space { flex:1; font-size:11px; color:#666; min-width:80px; }
  .kb-key.backspace { background:#2a1a1a; color:#CC0000; min-width:50px; }
  .kb-key.enter { background:#1a2a1a; color:#4CAF50; min-width:50px; }
  .kb-toggle {
    width:100%; background:#222; border:1px solid #333; border-radius:6px;
    color:#D4A520; font-size:12px; padding:7px; cursor:pointer;
    margin-bottom:8px; letter-spacing:1px;
  }

  /* Translator */
  .translator-box {
    background:#111; border:1px solid #2a2a2a;
    border-radius:8px; padding:12px; margin-top:12px;
  }
  .trans-label { font-size:11px; color:#555; margin-bottom:6px; }
  .trans-output {
    font-size:14px; color:#aaa; line-height:1.6;
    min-height:36px; font-family:sans-serif;
  }
  .btn-translate {
    width:100%; background:#1a1a2a; border:1px solid #3a3a6a;
    border-radius:6px; color:#7a7aff; font-size:13px;
    padding:8px; cursor:pointer; margin-top:8px;
    transition:background 0.2s;
  }
  .btn-translate:hover { background:#222; }

  /* Color buttons */
  .color-wrap { display:flex; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .color-btn {
    padding:6px 14px; border-radius:5px; border:none; cursor:pointer;
    font-size:13px; font-family:'Noto Sans Devanagari',sans-serif; font-weight:700;
  }
  .color-btn.red   { background:#CC0000; color:#fff; }
  .color-btn.gold  { background:#D4A520; color:#000; }
  .color-btn.white { background:#fff; color:#111; border:1px solid #333; }
  .color-btn.black { background:#111; color:#fff; border:1px solid #333; }

  .hint { font-size:11px; color:#555; margin-top:6px; line-height:1.6; }

  .preview-box {
    background:#111; border:1px solid #2a2a2a; border-radius:8px;
    padding:14px; font-size:15px; line-height:1.5; min-height:50px;
    font-family:'Noto Sans Devanagari',sans-serif; color:#fff; word-break:break-word;
  }

  .photo-preview {
    width:100%; height:140px; object-fit:cover;
    border-radius:8px; margin-top:10px; background:#111; display:block;
  }

  .btn-save {
    width:100%; background:linear-gradient(135deg,#CC0000,#990000);
    color:#fff; border:none; border-radius:8px;
    font-size:16px; font-weight:900;
    font-family:'Noto Sans Devanagari',sans-serif;
    padding:14px; cursor:pointer; margin-top:8px;
    letter-spacing:1px; transition:opacity 0.2s;
  }
  .btn-save:active { opacity:0.8; }

  .btn-view {
    width:100%; background:#1a1a1a; color:#D4A520;
    border:1px solid #D4A520; border-radius:8px;
    font-size:14px; font-family:'Noto Sans Devanagari',sans-serif;
    padding:12px; cursor:pointer; margin-top:10px;
    letter-spacing:1px; transition:background 0.2s;
  }
  .btn-view:hover { background:#222; }

  .toast {
    position:fixed; bottom:20px; left:50%;
    transform:translateX(-50%) translateY(80px);
    background:#D4A520; color:#000;
    padding:10px 24px; border-radius:8px;
    font-weight:700; font-size:14px;
    transition:transform 0.3s; z-index:999;
  }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="container">

  <div class="logo">
    <span>BBN</span>
    <p>NEWS ADMIN PANEL</p>
  </div>

  <!-- Headline Section -->
  <div class="section">
    <div class="section-title">📝 Headline / खबर</div>

    <label>खबर टाइप करो</label>
    <textarea id="rawText" placeholder="यहाँ खबर लिखो..." oninput="updatePreview()"></textarea>

    <!-- Hindi Keyboard -->
    <div class="hindi-keyboard">
      <button class="kb-toggle" onclick="toggleKB()">⌨️ हिंदी कीबोर्ड दिखाओ / छुपाओ</button>
      <div id="kbWrap" style="display:none">
        <div class="kb-rows" id="kbRows"></div>
      </div>
    </div>

    <!-- Translator -->
    <div class="translator-box">
      <div class="trans-label">🔄 Hindi → English Translation</div>
      <div class="trans-output" id="transOutput">translation yahan aayega...</div>
      <button class="btn-translate" onclick="translateText()">🌐 Translate karo</button>
    </div>

    <label style="margin-top:16px">रंग चुनो (text select करके button dabao)</label>
    <div class="color-wrap">
      <button class="color-btn red"   onclick="wrapColor('red')">🔴 लाल</button>
      <button class="color-btn gold"  onclick="wrapColor('gold')">🟡 सोना</button>
      <button class="color-btn white" onclick="wrapColor('white')">⬜ सफेद</button>
      <button class="color-btn black" onclick="wrapColor('black')">⬛ काला</button>
    </div>
    <div class="hint">💡 Text select karo → color button dabao → woh rang lag jayega</div>

    <label>Preview</label>
    <div class="preview-box" id="previewBox">यहाँ preview aayega</div>
  </div>

  <!-- Photo Section -->
  <div class="section">
    <div class="section-title">🖼️ Photo</div>
    <label>Photo URL daalo (internet se link)</label>
    <input type="text" id="photoUrl" placeholder="https://example.com/photo.jpg" oninput="previewPhoto()"/>
    <label>Ya photos/ folder ka naam</label>
    <input type="text" id="photoFile" placeholder="photos/modi.jpg" oninput="previewPhotoFile()"/>
    <img id="photoPreview" class="photo-preview" src="" alt="" style="display:none"/>
  </div>

  <!-- Source Section -->
  <div class="section">
    <div class="section-title">📡 Source / Channel</div>
    <label>Channel ka naam</label>
    <input type="text" id="sourceText" placeholder="BBN NEWS • bbn.com" value="BBN NEWS"/>
  </div>

  <button class="btn-save" onclick="saveNews()">💾 NEWS SAVE KARO</button>
  <button class="btn-view" onclick="window.location='index.html'">👁️ Card Dekho</button>

</div>
<div class="toast" id="toast">✅ News save ho gayi!</div>

<script>
// ── Hindi Keyboard Layout ──
const rows = [
  ['अ','आ','इ','ई','उ','ऊ','ए','ऐ','ओ','औ','अं','अः'],
  ['क','ख','ग','घ','ङ','च','छ','ज','झ','ञ','ट','ठ'],
  ['ड','ढ','ण','त','थ','द','ध','न','प','फ','ब','भ'],
  ['म','य','र','ल','व','श','ष','स','ह','ळ','क्ष','ज्ञ'],
  ['ा','ि','ी','ु','ू','े','ै','ो','ौ','ं','ः','्'],
  ['।','?','!','०','१','२','३','४','५','६','७','८','९'],
];

function buildKeyboard() {
  const wrap = document.getElementById('kbRows');
  rows.forEach(row => {
    const div = document.createElement('div');
    div.className = 'kb-row';
    row.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'kb-key';
      btn.textContent = ch;
      btn.onclick = () => insertChar(ch);
      div.appendChild(btn);
    });
    wrap.appendChild(div);
  });
  // Space, Backspace, Enter row
  const lastRow = document.createElement('div');
  lastRow.className = 'kb-row';
  lastRow.innerHTML = `
    <button class="kb-key backspace" onclick="insertChar('BACK')">⌫</button>
    <button class="kb-key space" onclick="insertChar(' ')">SPACE</button>
    <button class="kb-key enter" onclick="insertChar('\n')">↵</button>
  `;
  wrap.appendChild(lastRow);
}

function toggleKB() {
  const w = document.getElementById('kbWrap');
  w.style.display = w.style.display === 'none' ? 'block' : 'none';
}

function insertChar(ch) {
  const ta = document.getElementById('rawText');
  const s = ta.selectionStart, e = ta.selectionEnd;
  if (ch === 'BACK') {
    if (s === 0 && e === 0) return;
    ta.value = ta.value.substring(0, s > e ? s-1 : s) + ta.value.substring(e > s ? e : s);
    ta.selectionStart = ta.selectionEnd = s > 0 ? s-1 : 0;
  } else {
    ta.value = ta.value.substring(0,s) + ch + ta.value.substring(e);
    ta.selectionStart = ta.selectionEnd = s + ch.length;
  }
  ta.focus();
  updatePreview();
}

buildKeyboard();

// ── Translator (Google Translate free API) ──
async function translateText() {
  const text = document.getElementById('rawText').value.trim();
  if (!text) return;
  const plain = text.replace(/<[^>]+>/g,''); // remove HTML tags
  document.getElementById('transOutput').textContent = 'Translating...';
  try {
    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=hi&tl=en&dt=t&q=${encodeURIComponent(plain)}`;
    const res  = await fetch(url);
    const data = await res.json();
    const translated = data[0].map(x => x[0]).join('');
    document.getElementById('transOutput').textContent = translated;
  } catch(e) {
    document.getElementById('transOutput').textContent = '❌ Internet check karo ya baad mein try karo';
  }
}

// ── Preview ──
function updatePreview() {
  const text = document.getElementById('rawText').value;
  document.getElementById('previewBox').innerHTML = text || 'यहाँ preview aayega';
}

// ── Color Wrap ──
function wrapColor(color) {
  const ta = document.getElementById('rawText');
  const s = ta.selectionStart, e = ta.selectionEnd;
  if (s === e) return alert('Pehle text select karo!');
  const sel = ta.value.substring(s,e);
  const map = {red:'hl-red',gold:'hl-gold',white:'hl-white',black:'hl-black'};
  const wrapped = `<span class="${map[color]}">${sel}</span>`;
  ta.value = ta.value.substring(0,s) + wrapped + ta.value.substring(e);
  updatePreview();
}

// ── Photo Preview ──
function previewPhoto() {
  const url = document.getElementById('photoUrl').value.trim();
  if (url) showPhotoPreview(url);
}
function previewPhotoFile() {
  const f = document.getElementById('photoFile').value.trim();
  if (f) showPhotoPreview(f);
}
function showPhotoPreview(src) {
  const img = document.getElementById('photoPreview');
  img.src = src; img.style.display = 'block';
}

// ── Save ──
function saveNews() {
  const headline = document.getElementById('rawText').value.trim();
  const photoUrl  = document.getElementById('photoUrl').value.trim();
  const photoFile = document.getElementById('photoFile').value.trim();
  const source    = document.getElementById('sourceText').value.trim();
  const photo = photoUrl || photoFile || 'photos/default.jpg';
  if (!headline) return alert('Koi headline nahi likhi!');
  localStorage.setItem('bbn_news', JSON.stringify({headline,photo,source}));
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── Load saved ──
window.onload = function() {
  const saved = localStorage.getItem('bbn_news');
  if (saved) {
    const data = JSON.parse(saved);
    if (data.headline) { document.getElementById('rawText').value = data.headline; updatePreview(); }
    if (data.photo) {
      if (data.photo.startsWith('http')) document.getElementById('photoUrl').value = data.photo;
      else document.getElementById('photoFile').value = data.photo;
      showPhotoPreview(data.photo);
    }
    if (data.source) document.getElementById('sourceText').value = data.source;
  }
};
</script>
</body>
</html>
